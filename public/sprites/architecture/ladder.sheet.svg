<svg xmlns="http://www.w3.org/2000/svg"
    width="128" height="128"
    viewBox="0 0 128 128"
    role="img" aria-label="Refined ladder sprite sheet">
    <defs>
  <linearGradient id="body" x1="0" y1="0" x2="0.9" y2="1">
    <stop offset="0" stop-color="#aec5ba"/>
    <stop offset="0.48" stop-color="#58766a"/>
    <stop offset="1" stop-color="#263a33"/>
  </linearGradient>
  <linearGradient id="shell" x1="0.12" y1="0" x2="0.84" y2="1">
    <stop offset="0" stop-color="#aec5ba"/>
    <stop offset="0.22" stop-color="#58766a"/>
    <stop offset="0.7" stop-color="#263a33"/>

<svg xmlns="http://www.w3.org/2000/svg"
    width="64" height="64"
    viewBox="0 0 64 64"
    role="img" aria-label="Hull back wall panel A sprite sheet">
    <defs>
  <linearGradient id="body" x1="0" y1="0" x2="0.9" y2="1">
    <stop offset="0" stop-color="#e6d2a4"/>
    <stop offset="0.48" stop-color="#a07d4e"/>
    <stop offset="1" stop-color="#4b3825"/>
  </linearGradient>
  <linearGradient id="shell" x1="0.12" y1="0" x2="0.84" y2="1">
    <stop offset="0" stop-color="#e6d2a4"/>
    <stop offset="0.22" stop-color="#a07d4e"/>
    <stop offset="0.7" stop-color="#4b3825"/>
    <stop offset="1" stop-color="#111c1a"/>
  </linearGradient>
  <radialGradient id="glow">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
    <stop offset="0.28" stop-color="#ffe5a0" stop-opacity="0.9"/>
    <stop offset="1" stop-color="#f2b34b" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow" x="-40%" y="-40%" width="180%" height="190%">
    <feDropShadow dx="0" dy="2.5" stdDeviation="2.4" flood-color="#020908" flood-opacity="0.76"/>
  </filter>
  <filter id="soft-glow" x="-70%" y="-70%" width="240%" height="240%">
    <feGaussianBlur stdDeviation="2.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="frame-clip"><rect width="64" height="64"/></clipPath></defs>
    <g transform="translate(0 0)" clip-path="url(#frame-clip)">
      <g>
  <rect x="24" y="24" width="16" height="16" fill="#3b3023"/>
  <path d="M24 24 H40 M24 24 V40" stroke="#c29b5c" stroke-width=".8" opacity=".5"/>
  <path d="M40 24 V40 M24 40 H40" stroke="#130e08" stroke-width="1.1" opacity=".82"/>
  <path d="M25 25 H39" stroke="#fff0c9" stroke-width=".7" opacity=".22"/>
  <path d="M26 37 L37 26" stroke="#6d4e2e" stroke-width=".8" opacity=".34"/><circle cx="27" cy="27" r=".9" fill="#f2b34b" opacity=".7"/>
</g>
    </g>
  </svg>

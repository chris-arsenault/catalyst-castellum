  </filter>
  <clipPath id="frame-clip"><rect width="64" height="64"/></clipPath></defs>
    <g transform="translate(0 0)" clip-path="url(#frame-clip)">
      <g transform="translate(32 32) scale(-1 -1) translate(-32 -32)" filter="url(#shadow)">
    <path d="M27 18 V37 H46 V29 H35 V18Z" fill="url(#body)" stroke="#291c10" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 19 V33 H45" fill="none" stroke="#fff0c9" stroke-width="1" opacity=".64"/>
    <path d="M35 29 H44" stroke="#f2b34b" stroke-width="1.2" opacity=".78"/>
    <circle cx="31" cy="29" r="1.4" fill="#f2b34b" stroke="#291c10" stroke-width=".7"/>
  </g>
    </g>
  </svg>

<svg xmlns="http://www.w3.org/2000/svg"
    width="64" height="64"
    viewBox="0 0 64 64"
    role="img" aria-label="Hull floor right corner sprite sheet">
    <defs>
  <linearGradient id="body" x1="0" y1="0" x2="0.9" y2="1">
    <stop offset="0" stop-color="#e6d2a4"/>
    <stop offset="0.48" stop-color="#a07d4e"/>
    <stop offset="1" stop-color="#4b3825"/>
  </linearGradient>
  <linearGradient id="shell" x1="0.12" y1="0" x2="0.84" y2="1">
    <stop offset="0" stop-color="#e6d2a4"/>
    <stop offset="0.22" stop-color="#a07d4e"/>
    <stop offset="0.7" stop-color="#4b3825"/>
    <stop offset="1" stop-color="#111c1a"/>
  </linearGradient>
  <radialGradient id="glow">
    <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
    <stop offset="0.28" stop-color="#ffe5a0" stop-opacity="0.9"/>
    <stop offset="1" stop-color="#f2b34b" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow" x="-40%" y="-40%" width="180%" height="190%">

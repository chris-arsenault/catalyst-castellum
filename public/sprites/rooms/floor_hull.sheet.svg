<svg xmlns="http://www.w3.org/2000/svg"
    width="64" height="64"
    viewBox="0 0 64 64"
    role="img" aria-label="Hull floor section sprite sheet">
    <defs>
  <linearGradient id="body" x1="0" y1="0" x2="0.9" y2="1">
    <stop offset="0" stop-color="#e6d2a4"/>
    <stop offset="0.48" stop-color="#a07d4e"/>
    <stop offset="1" stop-color="#4b3825"/>
  </linearGradient>
  <linearGradient id="shell" x1="0.12" y1="0" x2="0.84" y2="1">

<svg xmlns="http://www.w3.org/2000/svg"
    width="64" height="64"
    viewBox="0 0 64 64"
    role="img" aria-label="Left wall section sprite sheet">
    <defs>
  <linearGradient id="body" x1="0" y1="0" x2="0.9" y2="1">
    <stop offset="0" stop-color="#80949a"/>
    <stop offset="0.48" stop-color="#3f5964"/>
    <stop offset="1" stop-color="#192b32"/>
  </linearGradient>
  <linearGradient id="shell" x1="0.12" y1="0" x2="0.84" y2="1">
    <stop offset="0" stop-color="#80949a"/>
    <stop offset="0.22" stop-color="#3f5964"/>
    <stop offset="0.7" stop-color="#192b32"/>
    <stop offset="1" stop-color="#111c1a"/>
  </linearGradient>
  <radialGradient id="glow">

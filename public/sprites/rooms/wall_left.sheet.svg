      <g>
    <rect x="24" y="24" width="8" height="16" fill="#020405" opacity=".68"/>
    <rect x="27" y="24" width="8" height="16" fill="url(#body)" stroke="#0b1215" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M33 25 V39" stroke="#c3d2d3" stroke-width=".9" opacity=".68"/>
    <path d="M29 28 L33 25 M29 39 L33 36" stroke="#2c414a" stroke-width=".9"/>
    <circle cx="31" cy="32" r="1" fill="#9c6048" stroke="#0b1215" stroke-width=".5"/>

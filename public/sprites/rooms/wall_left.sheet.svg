    <stop offset="0.28" stop-color="#d5996a" stop-opacity="0.9"/>
    <stop offset="1" stop-color="#b5664b" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow" x="-40%" y="-40%" width="180%" height="190%">

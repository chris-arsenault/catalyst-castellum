    <path d="M18 19 H60 M18 48 H60" stroke="#f2b34b" stroke-width="1.8" opacity=".84"/>
    <rect x="17" y="7" width="16" height="10" rx="2" fill="#71512e" stroke="#f2b34b" stroke-width="1.2"/>
    <circle cx="25" cy="12" r="2" fill="#f2b34b" stroke="#291c10" stroke-width="1"/>
    <path d="M36 12 H59 M25 53 H59" stroke="#f2b34b" stroke-width="2.6" opacity=".8"/>
